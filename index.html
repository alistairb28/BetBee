<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetBee EV Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0D2545;
    --navy-deep: #081A33;
    --navy-mid: #1B3F6E;
    --navy-light: #2A4F7E;
    --navy-surface: #15315A;
    --gold: #C8991A;
    --gold-light: #E6BC4A;
    --gold-bright: #F0D97A;
    --gold-dark: #8A6800;
    --gold-bg: rgba(200, 153, 26, 0.08);
    --text: #EEF1F7;
    --text-muted: #9AAABB;
    --text-faint: #6A7A8B;
    --border: rgba(200, 153, 26, 0.2);
    --border-strong: rgba(200, 153, 26, 0.4);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--navy-deep);
    background-image:
      radial-gradient(ellipse at top, var(--navy) 0%, var(--navy-deep) 70%),
      linear-gradient(180deg, var(--navy-deep) 0%, #050E1E 100%);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  .masthead {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .title-icon {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
  }

  .masthead h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2.5rem;
    font-weight: 600;
    color: var(--gold-bright);
    letter-spacing: 1px;
    line-height: 1;
  }

  .masthead .tagline {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .card {
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  }

  .section-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-title::before,
  .section-title::after {
    content: '';
    height: 1px;
    background: var(--border);
    flex: 1;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.75rem;
  }

  .form-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.75rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
  }

  label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }

  input {
    background: var(--navy-deep);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.65rem 0.85rem;
    color: var(--text);
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s ease;
    width: 100%;
  }

  input::placeholder { color: var(--text-faint); }

  input:focus {
    outline: none;
    border-color: var(--gold);
    background: var(--navy-surface);
    box-shadow: 0 0 0 3px var(--gold-bg);
  }

  input.auto-filled {
    color: var(--gold-light);
    border-color: var(--gold-dark);
    background: rgba(200, 153, 26, 0.05);
  }

  button {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--navy-deep);
    border: none;
    padding: 0.85rem 1.5rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    width: 100%;
    font-family: 'Inter', sans-serif;
  }

  button:hover {
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-bright) 100%);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(200, 153, 26, 0.3);
  }

  button:active { transform: translateY(0); }

  button.secondary {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    margin-top: 0.75rem;
  }

  button.secondary:hover {
    background: var(--navy-mid);
    color: var(--text);
    box-shadow: none;
  }

  .result-card {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 24px rgba(200, 153, 26, 0.15);
  }

  .result-header {
    text-align: center;
    padding-bottom: 1.5rem;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .result-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .result-pick {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2rem;
    color: var(--gold-bright);
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .result-ev {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .result-ev .ev-value {
    color: var(--gold-light);
    font-weight: 600;
    font-size: 1rem;
  }

  .outcomes {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
  }

  .outcome {
    background: var(--navy-deep);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 0.75rem;
    text-align: center;
    transition: all 0.2s ease;
  }

  .outcome.best {
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(200, 153, 26, 0.12) 0%, var(--navy-deep) 100%);
  }

  .outcome-name {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .outcome.best .outcome-name {
    color: var(--gold);
  }

  .outcome-ev {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.8rem;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 0.1rem;
    line-height: 1;
  }

  .outcome.best .outcome-ev {
    color: var(--gold-bright);
  }

  .outcome-ev-label {
    font-size: 0.6rem;
    color: var(--text-faint);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    font-weight: 500;
  }

  .outcome.best .outcome-ev-label {
    color: var(--gold);
  }

  .outcome-details {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    font-size: 0.7rem;
    color: var(--text-faint);
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }

  .outcome-details span {
    display: flex;
    justify-content: space-between;
    padding: 0 0.25rem;
  }

  .outcome-details .detail-label {
    color: var(--text-faint);
  }

  .outcome-details .detail-value {
    color: var(--text-muted);
    font-weight: 500;
  }

  .outcome.best .outcome-details .detail-value {
    color: var(--text);
  }

  .helper-text {
    font-size: 0.72rem;
    color: var(--text-faint);
    text-align: center;
    margin-top: -1.25rem;
    margin-bottom: 1.75rem;
    font-style: italic;
  }

  .optional-tag {
    font-family: 'Inter', sans-serif;
    font-size: 0.55rem;
    color: var(--text-faint);
    background: var(--navy-deep);
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 1px;
    font-weight: 500;
    border: 1px solid var(--border);
    margin-left: 0.5rem;
    vertical-align: 2px;
  }

  .outcome-edge-bar {
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
  }

  .outcome-edge-label {
    font-size: 0.55rem;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .outcome-edge-value {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-muted);
    line-height: 1;
  }

  .outcome-edge-value.positive {
    color: var(--gold-light);
  }

  .outcome-edge-value.negative {
    color: #C97070;
  }

  .outcome.best .outcome-edge-value.positive {
    color: var(--gold-bright);
  }

  .field-baseline {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-faint);
    letter-spacing: 0.5px;
  }

  .field-baseline span {
    color: var(--text-muted);
    font-weight: 500;
  }

  @media (max-width: 600px) {
    .container { padding: 2rem 1rem 3rem; }
    .masthead h1 { font-size: 2rem; }
    .card { padding: 1.5rem; }
    .form-grid { grid-template-columns: 1fr; }
    .outcomes { grid-template-columns: 1fr; }
    .result-pick { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="masthead">
    <div class="title-row">
      <svg class="title-icon" viewBox="0 0 60 50" xmlns="http://www.w3.org/2000/svg" aria-label="Bee">
        <ellipse cx="20" cy="13" rx="9" ry="7" fill="#F0D97A" fill-opacity="0.25" stroke="#F0D97A" stroke-width="1"/>
        <ellipse cx="36" cy="13" rx="9" ry="7" fill="#F0D97A" fill-opacity="0.25" stroke="#F0D97A" stroke-width="1"/>
        <ellipse cx="28" cy="30" rx="18" ry="12" fill="#F0D97A" stroke="#0D2545" stroke-width="1.5"/>
        <path d="M 20 21 Q 28 18 36 21 L 36 26 Q 28 23 20 26 Z" fill="#0D2545"/>
        <path d="M 16 32 Q 28 29 40 32 L 40 36 Q 28 33 16 36 Z" fill="#0D2545"/>
        <path d="M 10 31 L 4 32 L 10 28 Z" fill="#0D2545"/>
        <circle cx="42" cy="27" r="1.6" fill="#0D2545"/>
        <path d="M 44 22 Q 47 18 49 14" stroke="#0D2545" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        <circle cx="49" cy="14" r="1.6" fill="#0D2545"/>
        <path d="M 46 24 Q 50 22 53 19" stroke="#0D2545" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        <circle cx="53" cy="19" r="1.6" fill="#0D2545"/>
      </svg>
      <h1>BetBee</h1>
      <svg class="title-icon" viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg" aria-label="Hook">
        <circle cx="22" cy="8" r="5" stroke="#C8991A" stroke-width="2.5" fill="none"/>
        <line x1="22" y1="13" x2="22" y2="38" stroke="#C8991A" stroke-width="2.8" stroke-linecap="round"/>
        <path d="M 22 38 Q 22 53 13 53 Q 4 53 4 44 L 6 42" stroke="#C8991A" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 4 44 L 9 47" stroke="#C8991A" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="tagline">EV Calculator</div>
  </div>

  <div class="card">
    <div class="section-title">Teams</div>
    <div class="form-grid">
      <div class="form-group">
        <label for="teamA">Team A</label>
        <input type="text" id="teamA" placeholder="e.g. Czechia">
      </div>
      <div class="form-group">
        <label for="teamB">Team B</label>
        <input type="text" id="teamB" placeholder="e.g. South Africa">
      </div>
    </div>

    <div class="section-title">Betfair Odds</div>
    <div class="form-grid-3">
      <div class="form-group">
        <label for="oddsA">Team A Win</label>
        <input type="number" id="oddsA" placeholder="1.89" step="0.01" min="1.01">
      </div>
      <div class="form-group">
        <label for="oddsDraw">Draw</label>
        <input type="number" id="oddsDraw" placeholder="3.70" step="0.01" min="1.01">
      </div>
      <div class="form-group">
        <label for="oddsB">Team B Win</label>
        <input type="number" id="oddsB" placeholder="auto" step="0.01" min="1.01">
      </div>
    </div>
    <div class="helper-text">Team B odds fill automatically from Team A &amp; Draw (assumes 100% book)</div>

    <div class="section-title">Scoresheet Points</div>
    <div class="form-grid-3">
      <div class="form-group">
        <label for="ptsA">Team A Win</label>
        <input type="number" id="ptsA" placeholder="5" step="1" min="1">
      </div>
      <div class="form-group">
        <label for="ptsDraw">Draw</label>
        <input type="number" id="ptsDraw" placeholder="7" step="1" min="1">
      </div>
      <div class="form-group">
        <label for="ptsB">Team B Win</label>
        <input type="number" id="ptsB" placeholder="8" step="1" min="1">
      </div>
    </div>

    <div class="section-title">Field Predictions <span class="optional-tag">Optional</span></div>
    <div class="form-grid-3">
      <div class="form-group">
        <label for="fieldA">Team A Win %</label>
        <input type="number" id="fieldA" placeholder="81" step="1" min="0" max="100">
      </div>
      <div class="form-group">
        <label for="fieldDraw">Draw %</label>
        <input type="number" id="fieldDraw" placeholder="13" step="1" min="0" max="100">
      </div>
      <div class="form-group">
        <label for="fieldB">Team B Win %</label>
        <input type="number" id="fieldB" placeholder="6" step="1" min="0" max="100">
      </div>
    </div>
    <div class="helper-text">From the app's "Predicted Results" â€” when filled, the recommendation switches to highest Edge (contrarian-aware)</div>
  </div>

  <div id="result-container"></div>

</div>

<script>
  const oddsAInput = document.getElementById('oddsA');
  const oddsDrawInput = document.getElementById('oddsDraw');
  const oddsBInput = document.getElementById('oddsB');
  const ptsAInput = document.getElementById('ptsA');
  const ptsDrawInput = document.getElementById('ptsDraw');
  const ptsBInput = document.getElementById('ptsB');
  const teamAInput = document.getElementById('teamA');
  const teamBInput = document.getElementById('teamB');
  const fieldAInput = document.getElementById('fieldA');
  const fieldDrawInput = document.getElementById('fieldDraw');
  const fieldBInput = document.getElementById('fieldB');

  function round(num, decimals = 2) {
    return Math.round(num * Math.pow(10, decimals)) / Math.pow(10, decimals);
  }

  function autoFillOddsB() {
    const oddsA = parseFloat(oddsAInput.value);
    const oddsDraw = parseFloat(oddsDrawInput.value);

    if (!oddsA || !oddsDraw || oddsA <= 1 || oddsDraw <= 1) {
      if (oddsBInput.classList.contains('auto-filled')) {
        oddsBInput.value = '';
        oddsBInput.classList.remove('auto-filled');
      }
      return;
    }

    const probA = 1 / oddsA;
    const probDraw = 1 / oddsDraw;
    const probB = 1 - probA - probDraw;

    if (probB <= 0 || probB >= 1) {
      oddsBInput.value = '';
      oddsBInput.classList.remove('auto-filled');
      return;
    }

    const oddsB = 1 / probB;
    oddsBInput.value = round(oddsB, 2);
    oddsBInput.classList.add('auto-filled');
  }

  function updateResults() {
    const teamA = teamAInput.value.trim() || 'Team A';
    const teamB = teamBInput.value.trim() || 'Team B';
    const oddsA = parseFloat(oddsAInput.value);
    const oddsDraw = parseFloat(oddsDrawInput.value);
    const oddsB = parseFloat(oddsBInput.value);
    const ptsA = parseInt(ptsAInput.value);
    const ptsDraw = parseInt(ptsDrawInput.value);
    const ptsB = parseInt(ptsBInput.value);

    const container = document.getElementById('result-container');

    if (!oddsA || !oddsDraw || !oddsB || !ptsA || !ptsDraw || !ptsB) {
      container.innerHTML = '';
      return;
    }

    const probA = 1 / oddsA;
    const probDraw = 1 / oddsDraw;
    const probB = 1 / oddsB;

    const evA = probA * ptsA;
    const evDraw = probDraw * ptsDraw;
    const evB = probB * ptsB;

    // Field predictions - optional
    const rawFieldA = parseFloat(fieldAInput.value);
    const rawFieldDraw = parseFloat(fieldDrawInput.value);
    const rawFieldB = parseFloat(fieldBInput.value);
    const hasField = !isNaN(rawFieldA) && !isNaN(rawFieldDraw) && !isNaN(rawFieldB);

    let fieldA = 0, fieldDraw = 0, fieldB = 0;
    if (hasField) {
      // Normalise in case they don't sum to exactly 100
      const total = rawFieldA + rawFieldDraw + rawFieldB;
      fieldA = total > 0 ? rawFieldA / total : 0;
      fieldDraw = total > 0 ? rawFieldDraw / total : 0;
      fieldB = total > 0 ? rawFieldB / total : 0;
    }

    const outcomes = [
      { name: `${teamA} Win`, shortName: teamA, ev: evA, prob: probA, pts: ptsA, odds: oddsA, fieldPct: fieldA },
      { name: 'The Draw', shortName: 'Draw', ev: evDraw, prob: probDraw, pts: ptsDraw, odds: oddsDraw, fieldPct: fieldDraw },
      { name: `${teamB} Win`, shortName: teamB, ev: evB, prob: probB, pts: ptsB, odds: oddsB, fieldPct: fieldB }
    ];

    // Edge = EV Ã— (1 - field share). Captures contrarian leverage: how much you gain over the field IF you're right.
    outcomes.forEach(o => {
      o.edge = hasField ? o.ev * (1 - o.fieldPct) : null;
    });

    // Recommendation: use Edge when field data is provided (league-aware), else EV (single-match math).
    const rankBy = hasField ? 'edge' : 'ev';
    const bestIndex = outcomes.reduce((best, curr, i) =>
      curr[rankBy] > outcomes[best][rankBy] ? i : best, 0);
    const best = outcomes[bestIndex];

    const edgeHeaderHtml = hasField
      ? `<div class="result-ev" style="margin-top: 0.4rem;">Edge: <span class="ev-value">${round(best.edge, 2)}</span></div>`
      : '';

    container.innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <div class="result-label">Recommended Pick</div>
          <div class="result-pick">${best.name}</div>
          <div class="result-ev">Expected Value: <span class="ev-value">${round(best.ev, 2)}</span></div>
          ${edgeHeaderHtml}
        </div>
        <div class="outcomes">
          ${outcomes.map((o, i) => {
            const edgeBar = hasField ? `
              <div class="outcome-edge-bar">
                <div class="outcome-edge-label">Edge</div>
                <div class="outcome-edge-value ${o.edge > 0 ? 'positive' : ''}">${round(o.edge, 2)}</div>
              </div>
            ` : '';
            const fieldRow = hasField ? `
              <span><span class="detail-label">Field</span><span class="detail-value">${round(o.fieldPct * 100, 0)}%</span></span>
            ` : '';
            return `
              <div class="outcome ${i === bestIndex ? 'best' : ''}">
                <div class="outcome-name">${o.shortName}</div>
                <div class="outcome-ev">${round(o.ev, 2)}</div>
                <div class="outcome-ev-label">EV</div>
                <div class="outcome-details">
                  <span><span class="detail-label">Prob</span><span class="detail-value">${round(o.prob * 100, 1)}%</span></span>
                  <span><span class="detail-label">Points</span><span class="detail-value">${o.pts}</span></span>
                  <span><span class="detail-label">Odds</span><span class="detail-value">${o.odds}</span></span>
                  ${fieldRow}
                </div>
                ${edgeBar}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  [oddsAInput, oddsDrawInput].forEach(el => el.addEventListener('input', () => {
    autoFillOddsB();
    updateResults();
  }));

  oddsBInput.addEventListener('input', () => {
    oddsBInput.classList.remove('auto-filled');
    updateResults();
  });

  [ptsAInput, ptsDrawInput, ptsBInput, teamAInput, teamBInput,
   fieldAInput, fieldDrawInput, fieldBInput].forEach(el =>
    el.addEventListener('input', updateResults)
  );
</script>

</body>
</html>
